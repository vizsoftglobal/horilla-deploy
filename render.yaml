databases:
  - name: horilla-db
    plan: basic-256mb
    databaseName: horilla
    user: horilla

services:
  - type: web
    name: horilla
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /login
    numInstances: 1
    disk:
      name: horilla-media
      mountPath: /app/media
      sizeGB: 5
    dockerCommand: >-
      bash -c "python3 manage.py migrate --noinput &&
      python3 manage.py collectstatic --noinput &&
      exec gunicorn --bind 0.0.0.0:$PORT horilla.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: horilla-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: horilla.onrender.com,.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://horilla.onrender.com
      - key: TIME_ZONE
        value: Asia/Kolkata
      - key: DB_INIT_PASSWORD
        generateValue: true
